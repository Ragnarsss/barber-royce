    <!-- SEO: FAQ Schema for Rich Snippets -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Cuánto cuesta un corte de cabello en Royce Barbería?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "El corte de cabello clásico tiene un precio de $4.000 CLP e incluye asesoramiento completo, perfilado de cejas, diseños simples, lavado de cabello y aplicación de productos. Ofrecemos distintos servicios desde $2.500 hasta $8.000 CLP."
            }
          },
          {
            "@type": "Question",
            "name": "¿Necesito reservar cita o puedo llegar directamente?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Recomendamos reservar cita para garantizar tu atención en el horario que prefieras. También aceptamos clientes sin cita previa según disponibilidad. Puedes reservar llamando al teléfono de la barbería o mediante WhatsApp."
            }
          },
          {
            "@type": "Question",
            "name": "¿Dónde está ubicada Royce Barbería?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Estamos ubicados en Presidente Alessandri 1871, Coquimbo. Abrimos de lunes a sábado de 10:00 a 20:00 horas (sábados hasta las 18:00). Contamos con estacionamiento cercano y fácil acceso."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué servicios ofrece Royce Barbería?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ofrecemos cortes de cabello clásicos y modernos, diseño y arreglo de barba, afeitado premium con toallas calientes, corte fade, tratamientos capilares, tintura y color, depilación facial, y masajes capilares. Todos nuestros servicios incluyen productos premium y atención personalizada."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto tiempo dura un servicio de corte + barba?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "El servicio completo de corte + barba tiene una duración aproximada de 60 minutos. Incluye perfilado, diseño y acabado impecable con productos premium. Un corte de cabello solo dura aproximadamente 45 minutos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Royce Barbería acepta pagos con tarjeta?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, aceptamos todas las formas de pago: efectivo, tarjetas de crédito, débito y transferencias. Tu comodidad es nuestra prioridad."
            }
          }
        ]
      }
